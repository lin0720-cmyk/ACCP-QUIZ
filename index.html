<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業科目複習測驗</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f6f8; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 14px; color: #666; }
        .progress-bar { width: 100%; background-color: #e0e0e0; height: 8px; border-radius: 4px; margin-bottom: 20px; }
        .progress { background-color: #0056b3; height: 100%; border-radius: 4px; transition: width 0.3s ease; }
        
        /* 題組共用題幹樣式 */
        .shared-text { background: #fdfbf7; border-left: 4px solid #f59e0b; padding: 15px; margin-bottom: 20px; border-radius: 4px; font-size: 15px; line-height: 1.6; color: #4b5563; display: none; }
        
        .question-text { font-size: 16px; line-height: 1.6; margin-bottom: 20px; font-weight: 500; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { padding: 15px; border: 1px solid #d1d5db; border-radius: 8px; background: #f9fafb; text-align: left; font-size: 15px; cursor: pointer; transition: all 0.2s; }
        .option-btn:hover { background: #e5e7eb; }
        .option-btn.correct { background: #d1fae5; border-color: #10b981; color: #065f46; }
        .option-btn.wrong { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
        .option-btn:disabled { cursor: not-allowed; }
        .explanation { margin-top: 20px; padding: 15px; background: #eff6ff; border-left: 4px solid #3b82f6; border-radius: 4px; display: none; font-size: 14px; line-height: 1.6; }
        .next-btn { margin-top: 20px; width: 100%; padding: 15px; background: #0056b3; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; display: none; }
        .unit-label { text-align: right; font-size: 12px; color: #9ca3af; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span id="round-info">第 1 輪 (共 25 輪)</span>
        <span id="question-counter">1 / 10</span>
    </div>
    <div class="progress-bar"><div class="progress" id="progress"></div></div>
    
    <div id="quiz-area">
        <div class="shared-text" id="shared-text"></div>
        <div class="question-text" id="question-text">載入中...</div>
        <div class="options" id="options-area"></div>
        <div class="explanation" id="explanation"></div>
        <div class="unit-label" id="unit-label"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題</button>
    </div>
</div>

<script src="questions.js"></script>
<script>
    let currentPool = [];
    let currentRoundQuestions = [];
    let currentQuestionIndex = 0;
    let currentRound = 1;

    // 初始化測驗
    function initApp() {
        let savedPool = localStorage.getItem('quizPool');
        let savedRound = localStorage.getItem('quizRound');
        let savedRoundQs = localStorage.getItem('quizRoundQuestions');
        let savedIndex = localStorage.getItem('quizQuestionIndex');

        // 檢查是否有完整存檔紀錄 (防重整丟失進度)
        if (savedPool && savedRound && savedRoundQs && savedIndex && savedRound <= 25) {
            currentPool = JSON.parse(savedPool);
            currentRound = parseInt(savedRound);
            currentRoundQuestions = JSON.parse(savedRoundQs);
            currentQuestionIndex = parseInt(savedIndex);
            
            // 如果題庫因為更新變大，避免出錯，防呆檢查
            if(currentRoundQuestions.length > 0 && currentQuestionIndex < currentRoundQuestions.length) {
                renderQuestion();
                return;
            }
        } 
        
        // 如果沒有存檔或存檔損壞，重新開始
        if (!savedPool) {
            resetFullGame();
        } else {
            currentPool = JSON.parse(savedPool);
            currentRound = parseInt(savedRound);
            if (currentPool.length === 0) resetFullGame();
        }
        
        generateRound();
    }

    // 重置整個 25 輪循環
    function resetFullGame() {
        currentPool = [...questionBank];
        currentRound = 1;
        saveState();
    }

    // 產生這一輪的題目
    function generateRound() {
        currentRoundQuestions = [];
        // 洗牌當前題庫池
        currentPool.sort(() => Math.random() - 0.5);

        // 抽出約 10 題
        while (currentRoundQuestions.length < 10 && currentPool.length > 0) {
            let q = currentPool.pop();
            
            if (q.type === 'single') {
                currentRoundQuestions.push(q);
            } else if (q.type === 'group') {
                // 如果是題組，將子題目展開，並將共用題幹塞入子題目中
                q.subQuestions.forEach(subQ => {
                    currentRoundQuestions.push({
                        id: subQ.id,
                        unit: q.unit,
                        sharedText: q.sharedText,
                        question: subQ.question,
                        options: subQ.options,
                        answer: subQ.answer,
                        explanation: subQ.explanation
                    });
                });
            }
        }

        currentQuestionIndex = 0;
        saveState();
        renderQuestion();
    }

    // 儲存進度 (包含當前輪的進度)
    function saveState() {
        localStorage.setItem('quizPool', JSON.stringify(currentPool));
        localStorage.setItem('quizRound', currentRound);
        localStorage.setItem('quizRoundQuestions', JSON.stringify(currentRoundQuestions));
        localStorage.setItem('quizQuestionIndex', currentQuestionIndex);
    }

    // 渲染畫面
    function renderQuestion() {
        if (currentQuestionIndex >= currentRoundQuestions.length) {
            endRound();
            return;
        }

        let q = currentRoundQuestions[currentQuestionIndex];
        
        // 處理題組共用題幹
        let sharedTextDiv = document.getElementById('shared-text');
        if (q.sharedText) {
            sharedTextDiv.innerHTML = q.sharedText.replace(/\n/g, '<br>');
            sharedTextDiv.style.display = 'block';
        } else {
            sharedTextDiv.style.display = 'none';
        }

        document.getElementById('question-text').innerText = q.question;
        document.getElementById('unit-label').innerText = `單元：${q.unit}`;
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        
        // 更新進度條與計數
        document.getElementById('round-info').innerText = `第 ${currentRound} 輪 (共 25 輪)`;
        document.getElementById('question-counter').innerText = `${currentQuestionIndex + 1} / ${currentRoundQuestions.length}`;
        document.getElementById('progress').style.width = `${((currentQuestionIndex + 1) / currentRoundQuestions.length) * 100}%`;

        let optionsHtml = '';
        q.options.forEach((opt, index) => {
            optionsHtml += `<button class="option-btn" onclick="checkAnswer(${index})">${opt}</button>`;
        });
        document.getElementById('options-area').innerHTML = optionsHtml;
    }

    // 檢查答案
    function checkAnswer(selectedIndex) {
        let q = currentRoundQuestions[currentQuestionIndex];
        let btns = document.querySelectorAll('.option-btn');
        
        btns.forEach((btn, index) => {
            btn.disabled = true; // 鎖定按鈕
            if (index === q.answer) {
                btn.classList.add('correct');
            } else if (index === selectedIndex) {
                btn.classList.add('wrong');
            }
        });

        // 顯示詳解
        let expDiv = document.getElementById('explanation');
        expDiv.innerHTML = `<strong>詳解：</strong><br>${q.explanation}`;
        expDiv.style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
    }

    // 下一題
    function nextQuestion() {
        currentQuestionIndex++;
        saveState(); // 進入下一題前存檔
        renderQuestion();
    }

    // 結束此輪
    function endRound() {
        currentRound++;
        if (currentRound > 25) {
            alert("恭喜！25 輪全部完成，即將歸零重置！");
            resetFullGame();
        } else {
            alert(`第 ${currentRound - 1} 輪完成！準備進入下一輪。`);
        }
        generateRound();
    }

    // 啟動程式
    window.onload = initApp;
</script>

</body>
</html>
